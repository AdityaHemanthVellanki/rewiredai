<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)" opacity="0.12"/>

  <!-- Neural network paths (connections between nodes) -->
  <g stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.6">
    <!-- Core triangle connections -->
    <line x1="256" y1="120" x2="152" y2="320"/>
    <line x1="256" y1="120" x2="360" y2="320"/>
    <line x1="152" y1="320" x2="360" y2="320"/>

    <!-- Outer branch connections -->
    <line x1="256" y1="120" x2="256" y2="68"/>
    <line x1="152" y1="320" x2="96" y2="352"/>
    <line x1="360" y1="320" x2="416" y2="352"/>

    <!-- Cross connections -->
    <line x1="256" y1="120" x2="360" y2="200"/>
    <line x1="256" y1="120" x2="152" y2="200"/>
    <line x1="152" y1="200" x2="152" y2="320"/>
    <line x1="360" y1="200" x2="360" y2="320"/>

    <!-- Inner mesh -->
    <line x1="152" y1="200" x2="360" y2="200"/>
    <line x1="256" y1="260" x2="152" y2="200"/>
    <line x1="256" y1="260" x2="360" y2="200"/>
    <line x1="256" y1="260" x2="152" y2="320"/>
    <line x1="256" y1="260" x2="360" y2="320"/>
  </g>

  <!-- Neural nodes -->
  <g>
    <!-- Top node (primary) -->
    <circle cx="256" cy="120" r="24" fill="url(#accent)"/>
    <circle cx="256" cy="120" r="12" fill="#1a1025" opacity="0.5"/>

    <!-- Middle left -->
    <circle cx="152" cy="200" r="18" fill="url(#accent)"/>
    <circle cx="152" cy="200" r="9" fill="#1a1025" opacity="0.5"/>

    <!-- Middle right -->
    <circle cx="360" cy="200" r="18" fill="url(#accent)"/>
    <circle cx="360" cy="200" r="9" fill="#1a1025" opacity="0.5"/>

    <!-- Center node -->
    <circle cx="256" cy="260" r="20" fill="url(#accent)"/>
    <circle cx="256" cy="260" r="10" fill="#1a1025" opacity="0.5"/>

    <!-- Bottom left -->
    <circle cx="152" cy="320" r="22" fill="url(#accent)"/>
    <circle cx="152" cy="320" r="11" fill="#1a1025" opacity="0.5"/>

    <!-- Bottom right -->
    <circle cx="360" cy="320" r="22" fill="url(#accent)"/>
    <circle cx="360" cy="320" r="11" fill="#1a1025" opacity="0.5"/>

    <!-- Terminal nodes (smaller) -->
    <circle cx="256" cy="68" r="12" fill="url(#accent)" opacity="0.8"/>
    <circle cx="96" cy="352" r="12" fill="url(#accent)" opacity="0.8"/>
    <circle cx="416" cy="352" r="12" fill="url(#accent)" opacity="0.8"/>
  </g>

  <!-- Subtle pulse rings on primary node -->
  <circle cx="256" cy="120" r="32" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="256" cy="260" r="28" stroke="#a855f7" stroke-width="2" fill="none" opacity="0.2"/>
</svg>
